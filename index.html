<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<title>Frontend Mentor | Blog preview card</title>
	</head>
	<body class="body">
		<article class="blog-card">
			<figure class="blog-card__image-container">
				<img
					src="./assets/images/illustration-article.svg"
					alt="Image of lines and shapes"
					class="blog-card__image"
				/>
			</figure>

			<div class="blog-card__content">
				<div class="blog-card__tag-wrapper">
					<span class="blog-card__tag"> Learning </span>
				</div>

				<time datetime="2023-12-21" class="blog-card__publish-date">Published 21 Dec 2023</time>

				<h2 class="blog-card__title">HTML & CSS foundations</h2>

				<div class="blog-card__description">
					These languages are the backbone of every website, defining structure,
					content, and presentation.
				</div>
			</div>

			<footer class="blog-card__author">
				<img
					src="./assets/images/image-avatar.webp"
					alt="Greg Hooper"
					class="blog-card__avatar"
				/>
				<span class="blog-card__authorname"> Greg Hooper </span>
			</footer>
		</article>
		<footer class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
			Coded by <a href="#">Your Name Here</a>.
		</footer>
	</body>
</html>
